<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>Tape — offline</title>
  <link rel="icon" href="/icons/favicon-32.png" />
  <style>
    :root { color-scheme: dark; }
    html, body { height: 100%; margin: 0; }
    body {
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      gap: 14px; text-align: center; padding: 24px;
      background: #0b0e14; color: #e6ebf5;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    }
    img { width: 72px; height: 72px; }
    h1 { font-size: 18px; margin: 4px 0 0; font-weight: 600; }
    p { margin: 0; color: #9aa6bd; font-size: 14px; max-width: 320px; line-height: 1.5; }
    button {
      margin-top: 8px; padding: 10px 18px; border-radius: 10px; border: 1px solid #2a3346;
      background: #131722; color: #e6ebf5; font-size: 14px; cursor: pointer;
    }
    button:active { background: #1a2030; }
  </style>
</head>
<body>
  <img src="/icons/icon-192.png" alt="Tape" />
  <h1>You're offline</h1>
  <p>Tape needs a connection for live market data. Reconnect and try again.</p>
  <button onclick="location.reload()">Retry</button>
</body>
</html>
