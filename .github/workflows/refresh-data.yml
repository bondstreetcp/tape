name: Daily data refresh

# Re-pulls Yahoo data on a schedule, commits the updated snapshots, and pushes —
# which triggers Vercel to auto-redeploy with fresh prices, international data, and
# the day's options flow. Runs on GitHub's runners (the full fetch is well past
# Vercel's serverless time limit). Free — no local machine needed.

on:
  schedule:
    # ⚠️ Minutes are deliberately staggered OFF :00. GitHub's shared cron scheduler is most congested
    # at the top of the hour (and :15/:30/:45) — jobs there get delayed 1–2h or silently dropped, which
    # is exactly what was happening (the :00 runs ran 1–2.5h late and the 10:00 INTL run kept getting
    # skipped). Odd, off-peak minutes fire far more reliably. KEEP THE FULL/INTL cron strings IN SYNC
    # with the matchers in the job env below; the Asian/European quote ticks are now chosen by the
    # wall-clock UTC hour at run time, so they survive GitHub mislabeling a delayed/re-fired run.
    #
    # Intraday — lightweight quotes-only refresh (snapshots only; history series untouched). ~10am /
    # noon / 2pm / 4pm ET.
    - cron: "13 14 * * 1-5"
    - cron: "19 16 * * 1-5"
    - cron: "37 18 * * 1-5"
    - cron: "43 20 * * 1-5"
    # ~02 / 04 / 06 UTC — OVERNIGHT Asian-session ticks. Tokyo & Seoul trade 00:00–06:00 UTC, Hong Kong
    # to 08:00 — the whole US overnight. These quote ONLY the Asian universes (kospi/nikkei/hsi, ~126
    # names) so their snapshots track the live session instead of sitting a day stale next to the live
    # index chart until the 10:00 post-close refresh.
    - cron: "11 2 * * 1-5"
    - cron: "17 4 * * 1-5"
    - cron: "23 6 * * 1-5"
    # ~08 / 12 UTC — EUROPEAN-session ticks. London/Frankfurt/Paris/Zurich trade ~07:00–16:30 UTC. These
    # quote ONLY the European universes (cac40/aex/ftse100/dax/smi, ~190 names) so their snapshots track
    # the live session through the US early morning instead of sitting on yesterday's close — the 10:00
    # INTL run is a single, historically-flaky touch, and the first US tick (14:13) is ~9am ET. The later
    # US daytime ticks (14:13/16:19, ONLY unset) already re-quote Europe while it's still open.
    - cron: "9 8 * * 1-5"
    - cron: "31 12 * * 1-5"
    # ~10 UTC (~5–6am ET) — INTERNATIONAL-only refresh after the Asian close (Tokyo 06:00 / Seoul 06:30 /
    # Shanghai 07:00 / Hong Kong 08:00 UTC), so the Asian constituents aren't a day stale vs the live
    # index chart during the US day.
    - cron: "29 10 * * 1-5"
    # ~12:41 & ~21:19 UTC — the DESK ticks: regenerate the AI Daily Desk brief pre-open (~8:41am EDT,
    # the "morning run") and post-close (~5:19pm EDT, the "evening run"). GitHub cron has no DST, so
    # these drift +1h vs ET in winter; minutes deliberately off :15/:45 (scheduler congestion).
    - cron: "41 12 * * 1-5"
    - cron: "19 21 * * 1-5"
    # ~22 UTC — the FULL rebuild (history + intl + options flow + macro), ~1-2h after the 4pm ET close
    # (handles EST/EDT) so the options-flow scan captures the settled volume.
    - cron: "47 22 * * 1-5"
  workflow_dispatch: {} # lets you trigger it manually from the Actions tab (always a full rebuild)

# Allow the job to push the refreshed data back to the repo.
permissions:
  contents: write

# Serialize runs in the group, but do NOT cancel an in-flight one: when GitHub delays a scheduled run
# so it overlaps the next, finishing the running refresh matters more than starting the newer one — and
# cancel-in-progress was a way the (already delayed) INTL run could get dropped.
concurrency:
  group: refresh-data
  cancel-in-progress: false

jobs:
  refresh:
    runs-on: ubuntu-latest
    timeout-minutes: 210 # FULL run keeps growing: overnight-filings broad scan ~30m + insider/OGE/valuation-history ~15m each + campaigns/IPO/LLM tails. 150m KILLED the 2026-07-01 run at exactly 2h30 (conclusion "cancelled") → flow/desk-note went stale for a day; multi-expiry flow adds ~15m more. Keep comfortable headroom.
    # FULL = the after-close rebuild (22:00 schedule) or a manual run. INTL = the post-Asian-close
    # international-only refresh (10:00). Both gate which steps run. The intraday quotes tick instead
    # picks WHICH universes to re-quote from the wall-clock UTC hour at run time (see the "Pick session
    # universes" step) — NOT from github.event.schedule, which GitHub routinely mislabels when it
    # delays a scheduled run or re-fires a backlogged one.
    env:
      FULL: ${{ github.event_name == 'workflow_dispatch' || github.event.schedule == '47 22 * * 1-5' }}
      INTL: ${{ github.event.schedule == '29 10 * * 1-5' }}
      # DESK = the twice-daily Daily Desk brief ticks (pre-open + post-close) — they run the quote
      # refresh (wall-clock picked) + the desk note, then the usual R2 upload + deploy hook.
      DESK: ${{ github.event.schedule == '41 12 * * 1-5' || github.event.schedule == '19 21 * * 1-5' }}
      # Job-level so EVERY LLM step inherits it — 8 steps (trump-truth, fed, campaigns, biotech,
      # policy, catalyst-vol, corp-events, ipo) shipped without a per-step env block and silently
      # printed "LLM not configured — skipping" every night; their feeds only updated when run
      # locally. Per-step env blocks remain harmless duplicates.
      OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      # Hydrate data/ from R2 (the FULL prior tree) BEFORE any refresh. data/ is no longer committed to git
      # (it lives in R2), so a fresh checkout has an EMPTY data/. Without this, a refresh that only rewrites
      # PART of the tree (an intraday tick = ~15 snapshots; even a FULL run = most feeds but NOT the deep
      # per-symbol price history, nor any skip-write brief that legitimately produced nothing) leaves the
      # rest missing — and "Upload site data to R2" below would then overwrite R2 with that PARTIAL tree,
      # silently dropping thousands of files (this exact bug shrank R2 35 MB → 8 MB on 2026-07-03). It also
      # restores the forward-accumulating / skip-write feeds' prior state (campaigns, corp-events, congress,
      # trump, iv-history, trade-log, desk-note, valuation-explain, …) so they append instead of resetting.
      # Deliberately NOT continue-on-error: if R2 can't be read we must NOT proceed to upload a partial tree
      # over it — a hard failure here skips the upload (its default success() gate) and preserves R2.
      - name: Hydrate data/ from R2 (prior tree)
        run: npm run data-from-r2
        env:
          LAKE_S3_ENDPOINT: ${{ secrets.LAKE_S3_ENDPOINT }}
          LAKE_S3_BUCKET: ${{ secrets.LAKE_S3_BUCKET }}
          LAKE_S3_KEY_ID: ${{ secrets.LAKE_S3_KEY_ID }}
          LAKE_S3_SECRET: ${{ secrets.LAKE_S3_SECRET }}

      # Decide which regional markets to re-quote from the ACTUAL wall-clock UTC hour, not from
      # github.event.schedule. GitHub frequently delays a scheduled run 1-2h or re-fires a backlogged
      # one, so the cron string lies: on 2026-06-29 the 08:09 European tick ran at 09:11 carrying the
      # Asian label, so Europe didn't refresh all morning. Picking by "which session is live right now"
      # is delay-proof — a late tick refreshes whatever market is actually open, and the US-daytime
      # 'all' bucket re-quotes Europe anyway. Skipped on FULL/INTL (they don't run the quotes tick).
      - name: Pick session universes (wall-clock, delay-proof)
        if: ${{ env.FULL != 'true' && env.INTL != 'true' }}
        run: |
          H=$((10#$(date -u +%H)))
          if   [ "$H" -lt 7 ];  then ONLY="kospi,nikkei,topix,hsi";    MKT="Asian session";          fi
          if   [ "$H" -ge 7 ] && [ "$H" -lt 13 ]; then ONLY="cac40,aex,ftse100,dax,smi"; MKT="European morning"; fi
          if   [ "$H" -ge 13 ]; then ONLY="";                          MKT="US daytime (all universes)"; fi
          echo "ONLY=$ONLY" >> "$GITHUB_ENV"
          echo "Wall-clock ${H}:00 UTC → ${MKT} → ONLY='${ONLY}'"

      # ---- Intraday: quotes only. Re-prices each snapshot from fresh quotes and
      # rewrites just the ~15 snapshot files (the heavy per-symbol history series are
      # left untouched for the after-close run). ONLY is set by the step above.
      - name: Refresh quotes (intraday)
        if: ${{ env.FULL != 'true' && env.INTL != 'true' }}
        run: npm run refresh-quotes
        continue-on-error: true

      # ---- Full rebuild (after close / manual). Each source is independent — keep
      # going if one hiccups (rate limits etc.); the next run fills any gaps.
      - name: Refresh US universes (prices, returns, fundamentals)
        if: ${{ env.FULL == 'true' }}
        run: npm run refresh-data
        continue-on-error: true

      # The broad constituent lists leave a sector-level "Health Care"/"Financials" label on their
      # small-cap tail; refine those into real GICS sub-industries from Yahoo (cached, so it's cheap).
      - name: Refine generic sub-industry labels
        if: ${{ env.FULL == 'true' }}
        run: npm run patch-industries
        continue-on-error: true

      # The sector ETFs are fetched last in refresh-data, so a tail-of-run rate-limit
      # can blank them (→ null sector returns). Re-fetch just the 11 ETFs to repair.
      - name: Repair sector ETF returns
        if: ${{ env.FULL == 'true' }}
        run: npm run refresh-sectors
        continue-on-error: true

      # Backfill any per-symbol price history the big chart fetch dropped to rate-limits
      # (re-fetches only the empty/missing series, so it's cheap).
      - name: Backfill missing price history
        if: ${{ env.FULL == 'true' }}
        run: npm run refresh-series
        continue-on-error: true

      # Validated gross-profit backfills for the Margins chart (only the gap names; each
      # validated against EDGAR before trusting). SimFin runs the whole list each time (no
      # rate limit); Alpha Vantage is capped (~25/day free) so it works through the list over
      # a few nights. Both skip already-cached names, so they no-op once the list is covered.
      - name: Backfill margins — SimFin
        if: ${{ env.FULL == 'true' }}
        run: npm run refresh-margins-simfin
        env:
          SIMFIN_API_KEY: ${{ secrets.SIMFIN_API_KEY }}
        continue-on-error: true

      - name: Backfill margins — Alpha Vantage (capped)
        if: ${{ env.FULL == 'true' }}
        run: npm run refresh-margins-av
        env:
          ALPHAVANTAGE_API_KEY: ${{ secrets.ALPHAVANTAGE_API_KEY }}
          AV_BUDGET: "20"
        continue-on-error: true

      - name: Refresh international universes
        if: ${{ env.FULL == 'true' || env.INTL == 'true' }}
        run: npm run refresh-intl
        continue-on-error: true

      # Super-investor 13F holdings. The data only changes quarterly (filed ~45 days after
      # quarter-end), so most nights this no-ops; the CUSIP→ticker cache (data/cusip-map.json)
      # accretes so a given security is only ever mapped once. OPENFIGI_API_KEY is optional —
      # the keyless tier works, just slower.
      - name: Refresh super-investor 13F holdings
        if: ${{ env.FULL == 'true' }}
        run: npm run refresh-13f
        env:
          OPENFIGI_API_KEY: ${{ secrets.OPENFIGI_API_KEY }}
        continue-on-error: true

      # "Why it moved" catalyst lines for the Movers panel — needs the refreshed snapshots
      # above to know who the movers are. A 7-day per-symbol TTL keeps this cheap (only the
      # newly-rotated movers regenerate); skipped cleanly if GEMINI_API_KEY isn't set.
      - name: Refresh mover catalysts
        if: ${{ env.FULL == 'true' }}
        run: npm run refresh-catalysts
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        continue-on-error: true

      # Closed-end fund discount-to-NAV screener data (CEF Connect daily pricing). Public, no
      # key; one call for the whole ~360-fund universe. NAV updates end-of-day, so daily is right.
      - name: Refresh closed-end funds
        if: ${{ env.FULL == 'true' }}
        run: npm run refresh-cef
        continue-on-error: true

      # "Discount to own 10-year history" valuation screen. Rebuilds each US name's point-in-time
      # P/E / EV-EBITDA / P/S / P/B series from SEC EDGAR quarterly companyfacts + split-adjusted
      # prices and compares today's multiple to the name's own trailing-10yr median. Fundamentals
      # change quarterly, so this barely moves day to day — it has a built-in SEC rate-limiter
      # (~7 req/s + backoff). No key; iterates every US universe (deduped).
      - name: Refresh valuation history (discount to own history)
        if: ${{ env.FULL == 'true' }}
        run: npm run refresh-valuation-history
        continue-on-error: true

      # Relative-value pairs (stat-arb) — same-sector S&P 500 pairs whose spread is stretched + mean-reverts.
      # Pure local math off the stored price series (no fetch/LLM), so it's fast + free.
      - name: Refresh pairs (stat-arb)
        if: ${{ env.FULL == 'true' }}
        run: npm run refresh-pairs
        continue-on-error: true

      # Market betas (5y vs ^GSPC) → data/betas.json for the Portfolio Risk Cockpit. Pure local math off
      # the stored price series + one ^GSPC fetch; fast + free. Must run after the series are up to date.
      - name: Refresh betas (portfolio cockpit)
        if: ${{ env.FULL == 'true' }}
        run: npm run refresh-betas
        continue-on-error: true

      # Realized-vol cone screener — annualized RV cone (10/21/63/126/252d) + where current RV sits in each
      # name's own history, across EVERY universe. Pure local math off the stored series; no fetch, no LLM.
      - name: Refresh realized-vol cone
        if: ${{ env.FULL == 'true' }}
        run: npm run refresh-vol-cone
        continue-on-error: true

      # Index valuation history — synthesizes the S&P 500 median-multiple series from the per-name
      # valuation history (must run AFTER it) for the "valuation vs index over time" view.
      - name: Refresh index valuation
        if: ${{ env.FULL == 'true' }}
        run: npm run refresh-index-valuation
        continue-on-error: true

      # Estimate-revision snapshot (consensus EPS now vs 30/90d + up/down counts + analyst rating +
      # short interest) for the Revisions Momentum / Analyst Upside / Short-Squeeze boards. One Yahoo
      # quoteSummary per name; iterates every US universe (deduped).
      - name: Refresh estimate revisions
        if: ${{ env.FULL == 'true' }}
        run: npm run refresh-estimates
        continue-on-error: true

      # Holdco look-through NAV / discount (Prosus, Exor, GBL…) — live stake quotes + FX vs each
      # holdco's market price, off the curated roster in lib/holdco.ts. No key.
      - name: Refresh holdco NAV
        if: ${{ env.FULL == 'true' }}
        run: npm run refresh-holdco-nav
        continue-on-error: true

      # SEC Form 4 open-market BUY scan for the Insider Cluster-Buying board. Reuses the EDGAR parser;
      # filters each name's Form 4 list to the recent window before fetching XML, so it stays well
      # under EDGAR's ~10 req/s. Richest on the broad universes (insider buying is rare in mega-caps).
      - name: Refresh insider buys (Form 4)
        if: ${{ env.FULL == 'true' }}
        run: npm run refresh-insiders
        continue-on-error: true

      # Congressional (Senate STOCK Act) trades from the public Senate eFD. No key; polite
      # throttling built in. Disclosures lag ~30-45 days, so daily is plenty.
      - name: Refresh congressional trades
        if: ${{ env.FULL == 'true' }}
        run: npm run refresh-congress
        continue-on-error: true

      # President Trump's OGE Form 278-T trades (scanned PDF → Gemini OCR-cleanup extraction).
      # The filing changes rarely (periodic), so most runs re-extract the same data; skipped
      # cleanly if GEMINI_API_KEY isn't set.
      - name: Refresh President's OGE trades
        if: ${{ env.FULL == 'true' }}
        run: npm run refresh-trump
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        continue-on-error: true

      # Overnight Filings (SuperAnalyst) — AI desk notes on new material SEC filings (8-K/10-Q/10-K
      # + M&A/offering S-4/425/424B) accepted since the previous trading session. SCAN_BROAD=1
      # widens the watch-set from the large-cap core (S&P 500 ∪ Nasdaq 100 ∪ Russell 1000) to the
      # full Russell 3000 + S&P 1500, off EDGAR, then GLM via OpenRouter. ~3000 names at ~6 req/s
      # ≈ 8-10 min scan — the bumped job timeout covers it.
      # Needs OPENROUTER_API_KEY (repo secret); skipped cleanly if it isn't set.
      - name: Refresh overnight filings (SuperAnalyst)
        if: ${{ env.FULL == 'true' }}
        run: npm run refresh-overnight-filings
        env:
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
          SCAN_BROAD: "1"
        continue-on-error: true

      # Same-store / comparable sales for restaurants + retail — extracted from the night's earnings
      # 8-K press releases, spliced into the income statement + the Comps Board. Incremental: only a
      # name that reported a NEW quarter since the last run costs an LLM call (steady-state a handful).
      - name: Refresh same-store sales (comps)
        if: ${{ env.FULL == 'true' }}
        run: npm run refresh-sss
        env:
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
        continue-on-error: true

      # International (UK/EU) like-for-like — extracted from the night's RNS trading statements
      # (Investegate), written into the SAME comps file so the Comps Board + income splice pick them up.
      - name: Refresh intl same-store sales (UK/EU comps)
        if: ${{ env.FULL == 'true' }}
        run: npm run refresh-sss-intl
        env:
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
        continue-on-error: true

      # Management guidance (forward outlook) — LLM-extract the standing guide from the night's earnings
      # 8-Ks. Incremental: only a name that filed a NEW earnings 8-K since the last run costs an LLM call.
      - name: Refresh guidance (forward outlook)
        if: ${{ env.FULL == 'true' }}
        run: LIMIT=150 npm run refresh-guidance
        env:
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
        continue-on-error: true

      # Guidance board — joins guidance.json with the R3000 snapshot into the cross-sectional credibility
      # board (sandbagger / over-promiser tags). Pure transform, NO fetches; runs AFTER refresh-guidance.
      - name: Refresh guidance board
        if: ${{ env.FULL == 'true' }}
        run: npm run refresh-guidance-board
        continue-on-error: true

      # IV / pre-earnings-straddle history — a DAILY snapshot around each earnings window, so over time we
      # can compute the realized IV crush, IV-rank, and a long-premium backtest. Pure forward accumulation.
      - name: Refresh IV history
        if: ${{ env.FULL == 'true' }}
        run: npm run refresh-iv-history
        continue-on-error: true

      # Reddit buzz (ApeWisdom mention counts) — free, no key.
      - name: Refresh Reddit buzz
        if: ${{ env.FULL == 'true' }}
        run: npm run refresh-apewisdom
        continue-on-error: true

      # Cash-secured put-writing screen. Uses the refreshed snapshots (ROE / P/E / cap) + price
      # series above, then pulls option chains for the ~150 large caps that pass the quality/value
      # filter and prices the ~16-delta / ~35-DTE put. Globally rate-limited (Yahoo throttles
      # bursty options calls). Premiums are end-of-day last in this after-close pass — indicative.
      - name: Refresh put-writing screen
        if: ${{ env.FULL == 'true' }}
        run: npm run refresh-putwrite
        continue-on-error: true

      # Broad vol probe — widens Vol Dislocation beyond the ~380 quality put-writing names to the Russell
      # 1000 (cap-floored, excluding names putwrite already covers). Realized vol from the LOCAL series (no
      # fetch); one option pull per name for ATM IV + skew + term crush. Rate-limited like put-writing.
      # Set VOL_UNIVERSE=russell3000 to go wider (~3x the runtime).
      - name: Refresh broad vol-universe probe
        if: ${{ env.FULL == 'true' }}
        run: npm run refresh-vol-universe
        continue-on-error: true

      # Vol Dislocation — merges putwrite.json + vol-universe.json (variance premium + term crush + skew per
      # name), preferring the richer put-writing rows. NO option fetches of its own; runs AFTER both inputs.
      - name: Refresh vol-dislocation screen
        if: ${{ env.FULL == 'true' }}
        run: npm run refresh-vol-dislocation
        continue-on-error: true

      # Vol-tags — the LLM "why" (real catalyst vs genuine dislocation) on the top rich, non-earnings
      # names, grounded in recent headlines. Runs AFTER refresh-vol-dislocation. Needs OPENROUTER_API_KEY.
      - name: Refresh vol-dislocation catalyst tags
        if: ${{ env.FULL == 'true' }}
        run: npm run refresh-vol-tags
        env:
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
        continue-on-error: true

      - name: Refresh earnings expected-move screen
        if: ${{ env.FULL == 'true' }}
        run: npm run refresh-earnings-move
        continue-on-error: true

      # Earnings-play TRACK RECORD: log the card's suggested option structure for names about to report
      # (entry premiums + expiry captured live), then settle logged plays after the print / at expiry.
      # Pure forward accumulation — depends on the snapshots (earnings dates) refreshed earlier this run.
      - name: Refresh earnings-play track record
        if: ${{ env.FULL == 'true' }}
        run: npm run refresh-trade-log
        continue-on-error: true

      - name: Refresh options flow (S&P 500)
        if: ${{ env.FULL == 'true' }}
        run: npm run refresh-flow
        continue-on-error: true

      # Trump's Truth Social STOCK CALLS — scrape his recent posts (trumpstruth.org RSS; Truth Social
      # API is Cloudflare-blocked from CI), GLM keeps only the ones naming a public company, price the
      # move since. Forward-accumulating. Needs OPENROUTER_API_KEY; skips cleanly if unset.
      - name: Refresh Trump stock calls
        if: ${{ env.FULL == 'true' }}
        run: npm run refresh-trump-truth
        continue-on-error: true

      # Fed Watch — FOMC statements/minutes + Fed speeches + Beige Book → GLM hawkish/dovish digest.
      # Free federalreserve.gov feeds; needs OPENROUTER_API_KEY; forward-accumulating.
      - name: Refresh Fed Watch
        if: ${{ env.FULL == 'true' }}
        run: npm run refresh-fed
        continue-on-error: true

      # Activism & Short Campaigns — SEC EDGAR (13D + proxy-fight forms) + Muddy Waters RSS → GLM
      # extracts the target/campaigner/ask. Free sources; needs OPENROUTER_API_KEY; forward-accumulating.
      - name: Refresh campaigns (activist/short)
        if: ${{ env.FULL == 'true' }}
        run: npm run refresh-campaigns
        continue-on-error: true

      # Biotech Catalysts — ClinicalTrials.gov Phase 2/3 status changes → GLM maps sponsor→ticker +
      # catalyst read. Free API; needs OPENROUTER_API_KEY; forward-accumulating.
      - name: Refresh biotech catalysts
        if: ${{ env.FULL == 'true' }}
        run: npm run refresh-biotech
        continue-on-error: true

      # Biotech Event Vol — re-prices the dated PDUFA/readout binaries from biotech-catalysts.json
      # against the options chain (US options; no LLM). Must run AFTER refresh-biotech.
      - name: Refresh biotech event vol
        if: ${{ env.FULL == 'true' }}
        run: npm run refresh-biotech-vol
        continue-on-error: true

      # Policy & Contracts — Federal Register rules + USAspending contract awards → GLM maps to tickers.
      # Free APIs; needs OPENROUTER_API_KEY; forward-accumulating.
      - name: Refresh policy & contracts
        if: ${{ env.FULL == 'true' }}
        run: npm run refresh-policy
        continue-on-error: true

      # Catalyst-Vol — SEC 8-K investor/analyst days × options straddle vs realized-vol baseline
      # (cheap options into a known event). Free EDGAR + options; needs OPENROUTER_API_KEY.
      - name: Refresh catalyst vol
        if: ${{ env.FULL == 'true' }}
        run: npm run refresh-catalyst-vol
        continue-on-error: true

      # Trade Desk — assembles the week's top code-detected options mispricings (earnings-move +
      # vol-dislocation + catalyst-vol) and asks ONE LLM call to select + narrate the best. Runs LAST of
      # the options feeds so all three inputs exist. Needs OPENROUTER_API_KEY (falls back to a code-only
      # shortlist without it, so the page never empties).
      - name: Refresh trade desk
        if: ${{ env.FULL == 'true' }}
        run: npm run refresh-trade-ideas
        env:
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
        continue-on-error: true

      # Dispersion — VIX (macro.json) vs the cap-weighted ATM IV of the top ~100 S&P names BY CAP (fetched
      # fresh — the mega-caps the quality screen excludes). Rate-limited options fetch.
      - name: Refresh dispersion
        if: ${{ env.FULL == 'true' }}
        run: npm run refresh-dispersion
        continue-on-error: true

      # Dealer Gamma Board — universe-wide GEX (net/gross dealer gamma, flip, walls) across the top S&P
      # names + index ETFs. Live option chains (rate-limited), same model as /api/gamma. No LLM.
      - name: Refresh dealer gamma board
        if: ${{ env.FULL == 'true' }}
        run: npm run refresh-gamma-board
        continue-on-error: true

      # Post-earnings drift — recent reporters (guidance 8-K dates) × the LOCAL series (gap + drift). No fetch.
      - name: Refresh post-earnings drift
        if: ${{ env.FULL == 'true' }}
        run: npm run refresh-pead
        continue-on-error: true

      # Corporate Events — SEC 8-K full-text (buybacks, strategic-alts, spin-offs, splits, CEO changes)
      # → GLM extract. Free EDGAR; needs OPENROUTER_API_KEY; forward-accumulating.
      - name: Refresh corporate events
        if: ${{ env.FULL == 'true' }}
        run: npm run refresh-corp-events
        continue-on-error: true

      # (Merger-arb removed — the dedicated arb desk at arb.bondstreetcp.com is the real tool; the in-app
      #  board was redundant. The Event-Driven nav "Merger Arb" entry now links out there.)

      # IPOs & Lockups — SEC 424B4 (recent IPOs + ~180d lockup calendar) → GLM extract. Free EDGAR.
      - name: Refresh IPO & lockup monitor
        if: ${{ env.FULL == 'true' }}
        run: npm run refresh-ipo
        continue-on-error: true

      # Spinoff turnover — cumulative volume since the spin ÷ shares outstanding (the ~50%
      # seller-exhaustion clock). Curated roster in lib/spinoffs.ts; free Yahoo, no LLM.
      - name: Refresh spinoff turnover
        if: ${{ env.FULL == 'true' }}
        run: npm run refresh-spinoffs
        continue-on-error: true

      # Morning Desk Note — ONE GLM brief fusing the night's movers + catalysts + overnight
      # filings + options flow + analyst actions. Must run AFTER those inputs are refreshed
      # (data/catalysts.json, overnight-filings.json, options-flow.json + the snapshot).
      # Needs OPENROUTER_API_KEY; skipped cleanly if it isn't set.
      - name: Refresh Daily Desk Note
        if: ${{ env.FULL == 'true' || env.DESK == 'true' }}
        run: npm run refresh-desk-note
        env:
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
        continue-on-error: true

      # (The old mid-run "safety commit" of the desk note + data is gone: data/ is no longer tracked in
      # git — it's uploaded to R2 once, at the end of the run, by "Upload site data to R2". See
      # docs/DATA-ON-R2.md.)

      # Confluence Engine — fuses the night's INDEPENDENT bullish signals (valuation discount,
      # 13F adds, Congress buys, analyst upgrades, call-heavy flow, catalysts) into one ranked
      # opportunity board. Must run AFTER all those inputs (valuation-history.json,
      # superinvestors.json, congress.json, options-flow.json, catalysts.json + the snapshot).
      # GLM writes up the top names; needs OPENROUTER_API_KEY (skips write-ups cleanly if unset).
      - name: Refresh Confluence Engine
        if: ${{ env.FULL == 'true' }}
        run: npm run refresh-confluence
        env:
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
        continue-on-error: true

      # Cheap-vs-history EXPLAINED — GLM labels the deepest discounts genuine vs value-trap.
      # Needs valuation-history.json + the snapshot (above) + OPENROUTER_API_KEY.
      - name: Refresh valuation-discount verdicts
        if: ${{ env.FULL == 'true' }}
        run: npm run refresh-valuation-explain
        env:
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
        continue-on-error: true

      # QoQ 13F Story — GLM narrative of the roster's consensus rotation. Needs superinvestors.json
      # (refresh-13f above) + OPENROUTER_API_KEY.
      - name: Refresh 13F quarter story
        if: ${{ env.FULL == 'true' }}
        run: npm run refresh-13f-story
        env:
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
        continue-on-error: true

      # Congress-trading "what's notable" summary — needs congress.json (refresh-congress above).
      - name: Refresh Congress summary
        if: ${{ env.FULL == 'true' }}
        run: npm run refresh-congress-summary
        env:
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
        continue-on-error: true

      # FRED macro snapshot (yield curve, inflation, growth, credit spreads). The keyed
      # data API needs FRED_API_KEY (repo secret) for full history; without it the keyless
      # CSV still works but caps at ~3yr.
      - name: Refresh macro (FRED)
        if: ${{ env.FULL == 'true' }}
        run: npm run refresh-macro
        env:
          FRED_API_KEY: ${{ secrets.FRED_API_KEY }}
        continue-on-error: true

      # Evaluate user alert rules against the freshly-refreshed data and write matches to Postgres
      # (the in-app bell). Runs on EVERY tick — intraday (after the quotes refresh, so price alerts
      # fire during the session) and FULL (after the full rebuild). Writes to the DB, not data/, so
      # it's outside the commit. No-ops if RESEARCH_DATABASE_URL isn't set as a repo secret.
      - name: Evaluate alerts
        run: npm run eval-alerts
        env:
          RESEARCH_DATABASE_URL: ${{ secrets.RESEARCH_DATABASE_URL }}
        continue-on-error: true

      # Research lake — export the day's equity panel + refresh the ~6yr price history to Parquet on
      # Cloudflare R2 (DuckDB) for ad-hoc historical cross-sections. Reads the snapshots + series
      # refreshed earlier this run. INERT until the LAKE_S3_* secrets are set (it writes to a discarded
      # local dir otherwise). Data lands in R2, NOT git — the whole point is keeping bulk, frequently-
      # rewritten data out of the repo history. See docs/RESEARCH-LAKE.md.
      - name: Export research lake (Parquet → R2)
        if: ${{ env.FULL == 'true' }}
        run: npm run build-lake && npm run backfill-prices
        env:
          LAKE_S3_ENDPOINT: ${{ secrets.LAKE_S3_ENDPOINT }}
          LAKE_S3_KEY_ID: ${{ secrets.LAKE_S3_KEY_ID }}
          LAKE_S3_SECRET: ${{ secrets.LAKE_S3_SECRET }}
          LAKE_S3_BUCKET: ${{ secrets.LAKE_S3_BUCKET }}
        continue-on-error: true

      # Upload the operational data/ tree to R2 as ONE tarball (build-time hydration — see
      # docs/DATA-ON-R2.md). Runs every tick so R2 stays as fresh as git. MIGRATION SAFETY PHASE: we
      # STILL commit data/ below, so R2 and git carry the same data until the Vercel cutover is proven;
      # then the commit is dropped and this becomes the sole data path. Inert without the LAKE_S3_* secrets.
      - name: Upload site data to R2 (build-time hydration)
        run: npm run data-to-r2
        env:
          LAKE_S3_ENDPOINT: ${{ secrets.LAKE_S3_ENDPOINT }}
          LAKE_S3_BUCKET: ${{ secrets.LAKE_S3_BUCKET }}
          LAKE_S3_KEY_ID: ${{ secrets.LAKE_S3_KEY_ID }}
          LAKE_S3_SECRET: ${{ secrets.LAKE_S3_SECRET }}
        continue-on-error: true

      # (The end-of-run "commit & push data" step is gone — data/ is gitignored and lives in R2, uploaded
      # by the step above. Post-cutover `git add -A data` matched only ignored paths and EXITED 1, which
      # (this step lacking continue-on-error) failed the job and cascaded to SKIP the freshness gate and
      # the Deploy Hook below — so no production deploy ever fired. Removing it lets the run flow straight
      # from the R2 upload → freshness gate → deploy.)

      # Data-freshness gate — the ONE step deliberately allowed to fail the job. EVERY refresh step
      # above is continue-on-error (a single source hiccup must not abort the whole night), so a
      # silently-dead feed — a broken scraper, a dead key, a step that failed under continue-on-error —
      # leaves no trace except a data file that quietly stops updating. This reads each feed's
      # generatedAt + each snapshot's row count (lib/dataFreshness) and exits non-zero if any is
      # stale / missing / empty, turning the run RED and emailing the owner — the site's only recurring
      # incident (a feed nobody noticed had died) finally has an alarm. Runs AFTER the push so a stale
      # feed never blocks the data that DID refresh from landing. FULL-only: on intraday ticks only
      # quotes refresh, so the nightly derived files are legitimately hours old.
      - name: Data-freshness gate
        if: ${{ env.FULL == 'true' }}
        run: npm run check-freshness

      # Trigger a Vercel production deploy via Deploy Hook. Reliable — the git-push webhook is flaky,
      # and after the data/→R2 cutover there is NO data commit to trigger a deploy at all, so this
      # becomes the sole trigger. Placed LAST: if the freshness gate above failed, this is skipped
      # (default step behaviour), so we never deploy known-stale data. Inert without the secret.
      - name: Trigger Vercel deploy (Deploy Hook)
        run: |
          if [ -n "$VERCEL_DEPLOY_HOOK" ]; then
            echo "Triggering Vercel deploy…"
            curl -sS -X POST "$VERCEL_DEPLOY_HOOK" | head -c 300; echo
          else
            echo "VERCEL_DEPLOY_HOOK not set — skipping (relying on Vercel's git integration)."
          fi
        env:
          VERCEL_DEPLOY_HOOK: ${{ secrets.VERCEL_DEPLOY_HOOK }}
        continue-on-error: true
