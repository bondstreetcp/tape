name: Refresh market data

# Re-pulls Yahoo Finance data on a schedule, commits the updated snapshot, and
# pushes — which triggers Vercel to auto-redeploy with fresh prices.
#
# Runs on GitHub's runners (not Vercel) because the full ~1,650-symbol fetch
# takes several minutes, well past Vercel's serverless time limit.

on:
  schedule:
    # 22:00 UTC on weekdays — ~1-2h after the US market close (handles EST/EDT).
    - cron: "0 22 * * 1-5"
  workflow_dispatch: {} # lets you trigger it manually from the Actions tab

# Allow the job to push the refreshed data back to the repo.
permissions:
  contents: write

# Don't let a manual run and a scheduled run stack up.
concurrency:
  group: refresh-data
  cancel-in-progress: true

jobs:
  refresh:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Refresh market data
        run: npm run refresh-data

      - name: Commit & push if data changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A data
          if git diff --cached --quiet; then
            echo "No data changes — nothing to commit."
          else
            git commit -m "chore: refresh market data ($(date -u +%Y-%m-%d))"
            git push
          fi
