name: Daily data refresh

# Re-pulls Yahoo data on a schedule, commits the updated snapshots, and pushes —
# which triggers Vercel to auto-redeploy with fresh prices, international data, and
# the day's options flow. Runs on GitHub's runners (the full fetch is well past
# Vercel's serverless time limit). Free — no local machine needed.

on:
  schedule:
    # Intraday — lightweight quotes-only refresh (snapshots only; history series untouched).
    # UTC, so ~1h earlier in ET during winter (EST). Roughly 10am / noon / 2pm / 4pm ET.
    - cron: "0 14 * * 1-5"
    - cron: "0 16 * * 1-5"
    - cron: "0 18 * * 1-5"
    - cron: "0 20 * * 1-5"
    # 02:00 / 04:00 / 06:00 UTC — OVERNIGHT Asian-session ticks. Tokyo & Seoul trade 00:00–06:00 UTC,
    # Hong Kong to 08:00 — i.e. the whole US overnight. These quote ONLY the Asian universes
    # (kospi/nikkei/hsi, ~126 names) so their snapshots track the live session instead of sitting a
    # day stale next to the live index chart until the 10:00 post-close refresh.
    - cron: "0 2 * * 1-5"
    - cron: "0 4 * * 1-5"
    - cron: "0 6 * * 1-5"
    # 10:00 UTC (~5–6am ET) — INTERNATIONAL-only refresh after the Asian close (Tokyo 06:00 /
    # Seoul 06:30 / Shanghai 07:00 / Hong Kong 08:00 UTC). The 22:00 full run captures Asia's
    # *previous* session, so without this the Asian constituent snapshots read a day stale next
    # to the live index chart when you view during the US day.
    - cron: "0 10 * * 1-5"
    # 22:00 UTC — the FULL rebuild (history + intl + options flow + macro), ~1-2h after the
    # 4pm ET close (handles EST/EDT) so the options-flow scan captures the settled volume.
    - cron: "0 22 * * 1-5"
  workflow_dispatch: {} # lets you trigger it manually from the Actions tab (always a full rebuild)

# Allow the job to push the refreshed data back to the repo.
permissions:
  contents: write

# Don't let a manual run and a scheduled run stack up.
concurrency:
  group: refresh-data
  cancel-in-progress: true

jobs:
  refresh:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    # FULL = the after-close rebuild (22:00 schedule) or a manual run. INTL = the post-Asian-close
    # international-only refresh (10:00). ASIA = an overnight Asian-session quotes tick (02/04/06).
    # Any other scheduled tick is an intraday quotes-only refresh of every universe.
    env:
      FULL: ${{ github.event_name == 'workflow_dispatch' || github.event.schedule == '0 22 * * 1-5' }}
      INTL: ${{ github.event.schedule == '0 10 * * 1-5' }}
      ASIA: ${{ github.event.schedule == '0 2 * * 1-5' || github.event.schedule == '0 4 * * 1-5' || github.event.schedule == '0 6 * * 1-5' }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      # ---- Intraday: quotes only. Re-prices each snapshot from fresh quotes and
      # rewrites just the ~15 snapshot files (the heavy per-symbol history series are
      # left untouched for the after-close run).
      - name: Refresh quotes (intraday)
        if: ${{ env.FULL != 'true' && env.INTL != 'true' }}
        # Asian-session ticks quote only the Asian universes (markets live, US closed); the daytime
        # US ticks (ONLY unset) quote every universe as before.
        env:
          ONLY: ${{ env.ASIA == 'true' && 'kospi,nikkei,hsi' || '' }}
        run: npm run refresh-quotes
        continue-on-error: true

      # ---- Full rebuild (after close / manual). Each source is independent — keep
      # going if one hiccups (rate limits etc.); the next run fills any gaps.
      - name: Refresh US universes (prices, returns, fundamentals)
        if: ${{ env.FULL == 'true' }}
        run: npm run refresh-data
        continue-on-error: true

      # The sector ETFs are fetched last in refresh-data, so a tail-of-run rate-limit
      # can blank them (→ null sector returns). Re-fetch just the 11 ETFs to repair.
      - name: Repair sector ETF returns
        if: ${{ env.FULL == 'true' }}
        run: npm run refresh-sectors
        continue-on-error: true

      # Backfill any per-symbol price history the big chart fetch dropped to rate-limits
      # (re-fetches only the empty/missing series, so it's cheap).
      - name: Backfill missing price history
        if: ${{ env.FULL == 'true' }}
        run: npm run refresh-series
        continue-on-error: true

      # Validated gross-profit backfills for the Margins chart (only the gap names; each
      # validated against EDGAR before trusting). SimFin runs the whole list each time (no
      # rate limit); Alpha Vantage is capped (~25/day free) so it works through the list over
      # a few nights. Both skip already-cached names, so they no-op once the list is covered.
      - name: Backfill margins — SimFin
        if: ${{ env.FULL == 'true' }}
        run: npm run refresh-margins-simfin
        env:
          SIMFIN_API_KEY: ${{ secrets.SIMFIN_API_KEY }}
        continue-on-error: true

      - name: Backfill margins — Alpha Vantage (capped)
        if: ${{ env.FULL == 'true' }}
        run: npm run refresh-margins-av
        env:
          ALPHAVANTAGE_API_KEY: ${{ secrets.ALPHAVANTAGE_API_KEY }}
          AV_BUDGET: "20"
        continue-on-error: true

      - name: Refresh international universes
        if: ${{ env.FULL == 'true' || env.INTL == 'true' }}
        run: npm run refresh-intl
        continue-on-error: true

      # Super-investor 13F holdings. The data only changes quarterly (filed ~45 days after
      # quarter-end), so most nights this no-ops; the CUSIP→ticker cache (data/cusip-map.json)
      # accretes so a given security is only ever mapped once. OPENFIGI_API_KEY is optional —
      # the keyless tier works, just slower.
      - name: Refresh super-investor 13F holdings
        if: ${{ env.FULL == 'true' }}
        run: npm run refresh-13f
        env:
          OPENFIGI_API_KEY: ${{ secrets.OPENFIGI_API_KEY }}
        continue-on-error: true

      # "Why it moved" catalyst lines for the Movers panel — needs the refreshed snapshots
      # above to know who the movers are. A 7-day per-symbol TTL keeps this cheap (only the
      # newly-rotated movers regenerate); skipped cleanly if GEMINI_API_KEY isn't set.
      - name: Refresh mover catalysts
        if: ${{ env.FULL == 'true' }}
        run: npm run refresh-catalysts
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        continue-on-error: true

      # Closed-end fund discount-to-NAV screener data (CEF Connect daily pricing). Public, no
      # key; one call for the whole ~360-fund universe. NAV updates end-of-day, so daily is right.
      - name: Refresh closed-end funds
        if: ${{ env.FULL == 'true' }}
        run: npm run refresh-cef
        continue-on-error: true

      # Congressional (Senate STOCK Act) trades from the public Senate eFD. No key; polite
      # throttling built in. Disclosures lag ~30-45 days, so daily is plenty.
      - name: Refresh congressional trades
        if: ${{ env.FULL == 'true' }}
        run: npm run refresh-congress
        continue-on-error: true

      # Cash-secured put-writing screen. Uses the refreshed snapshots (ROE / P/E / cap) + price
      # series above, then pulls option chains for the ~150 large caps that pass the quality/value
      # filter and prices the ~16-delta / ~35-DTE put. Globally rate-limited (Yahoo throttles
      # bursty options calls). Premiums are end-of-day last in this after-close pass — indicative.
      - name: Refresh put-writing screen
        if: ${{ env.FULL == 'true' }}
        run: npm run refresh-putwrite
        continue-on-error: true

      - name: Refresh options flow (S&P 500)
        if: ${{ env.FULL == 'true' }}
        run: npm run refresh-flow
        continue-on-error: true

      # FRED macro snapshot (yield curve, inflation, growth, credit spreads). The keyed
      # data API needs FRED_API_KEY (repo secret) for full history; without it the keyless
      # CSV still works but caps at ~3yr.
      - name: Refresh macro (FRED)
        if: ${{ env.FULL == 'true' }}
        run: npm run refresh-macro
        env:
          FRED_API_KEY: ${{ secrets.FRED_API_KEY }}
        continue-on-error: true

      - name: Commit & push if data changed
        env:
          SCHED: ${{ github.event.schedule }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A data
          if git diff --cached --quiet; then
            echo "No data changes — nothing to commit."
            exit 0
          fi
          if [ "$SCHED" = "0 22 * * 1-5" ] || [ -z "$SCHED" ]; then
            MSG="chore: daily data refresh ($(date -u +%Y-%m-%d))"
          elif [ "$SCHED" = "0 10 * * 1-5" ]; then
            MSG="chore: intl refresh after Asian close ($(date -u +%Y-%m-%d))"
          else
            MSG="chore: intraday quotes ($(date -u +%Y-%m-%dT%H:%MZ))"
          fi
          git commit -m "$MSG"
          # The fetch takes a while; if other commits landed meanwhile, the push is
          # rejected (non-fast-forward). Replay our data-only commit on top of the latest
          # main and retry. This refresh just regenerated every data file, so if the remote
          # ALSO touched data/ (a feature commit, an overlapping run), our freshly-pulled
          # copy is authoritative — keep it on conflict. During a rebase "theirs" is the
          # commit being replayed, i.e. ours. A stuck rebase is aborted before retrying so
          # the loop never spins on a half-finished rebase.
          for i in 1 2 3 4 5; do
            if git push; then
              echo "Pushed."
              exit 0
            fi
            echo "Push rejected — syncing with origin/main and retrying ($i/5)…"
            git fetch origin main || true
            if ! git rebase -X theirs origin/main; then
              echo "Rebase could not auto-resolve — aborting and retrying."
              git rebase --abort || true
            fi
            sleep 5
          done
          echo "Push failed after retries"
          exit 1
