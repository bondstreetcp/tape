name: Daily data refresh

# Re-pulls Yahoo data on a schedule, commits the updated snapshots, and pushes —
# which triggers Vercel to auto-redeploy with fresh prices, international data, and
# the day's options flow. Runs on GitHub's runners (the full fetch is well past
# Vercel's serverless time limit). Free — no local machine needed.

on:
  schedule:
    # 22:00 UTC on weekdays — ~1-2h after the 4pm ET close (handles EST/EDT), so
    # the options-flow scan captures the settled volume.
    - cron: "0 22 * * 1-5"
  workflow_dispatch: {} # lets you trigger it manually from the Actions tab

# Allow the job to push the refreshed data back to the repo.
permissions:
  contents: write

# Don't let a manual run and a scheduled run stack up.
concurrency:
  group: refresh-data
  cancel-in-progress: true

jobs:
  refresh:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      # Each source is independent — keep going if one hiccups (rate limits etc.);
      # the next run will fill any gaps.
      - name: Refresh US universes (prices, returns, fundamentals)
        run: npm run refresh-data
        continue-on-error: true

      - name: Refresh international universes
        run: npm run refresh-intl
        continue-on-error: true

      - name: Refresh options flow (S&P 500)
        run: npm run refresh-flow
        continue-on-error: true

      - name: Commit & push if data changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A data
          if git diff --cached --quiet; then
            echo "No data changes — nothing to commit."
            exit 0
          fi
          git commit -m "chore: daily data refresh ($(date -u +%Y-%m-%d))"
          # The fetch takes a while; if other commits landed meanwhile, the push is
          # rejected (non-fast-forward). Rebase the data commit on top and retry —
          # data/ files never conflict with code changes.
          for i in 1 2 3; do
            if git pull --rebase origin main && git push; then
              echo "Pushed."
              exit 0
            fi
            echo "Push race — rebasing and retrying ($i/3)…"
            sleep 5
          done
          echo "Push failed after retries"
          exit 1
