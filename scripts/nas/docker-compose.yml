# Tape compute for the Synology DS1621+ — a SELF-SCHEDULING container. Drag-and-drop setup:
#   1. In File Station, make a folder e.g. /docker/tape and drop in THREE files:
#        docker-compose.yml   (this file)
#        tape-entrypoint.sh   (scripts/nas/tape-entrypoint.sh)
#        tape.env             (copy tape.env.example → tape.env and fill in your keys)
#   2. Container Manager → Project → Create → point at that folder → Build → Run.
# The container clones the repo, installs deps, and runs a tick every hour — no SSH, no DSM task.
# Full runbook + the alternative external-scheduler setup: docs/SETUP-NAS-CRON.md.
services:
  tape-runner:
    image: node:22-bookworm # the FULL variant (not -slim/-alpine) — it ships git, which the entrypoint needs
    container_name: tape-runner
    working_dir: /app
    restart: unless-stopped
    env_file:
      - ./tape.env # ALL the API keys + VERCEL_DEPLOY_HOOK — keep this file chmod 600, never in the repo
    environment:
      - TAPE_PULL=1 # each tick git-pulls main first (fresh code without rebuilding the image)
      - TAPE_LOG=/app/tick.log
    volumes:
      - ./repo:/app # the repo + node_modules live here so they persist across restarts (cloned on first boot)
      - ./tape-entrypoint.sh:/tape-entrypoint.sh:ro
    entrypoint: ["sh", "/tape-entrypoint.sh"]
    # 64 GB box, so no limits needed; uncomment to cap if the NAS runs other heavy services:
    # mem_limit: 24g
    # cpus: 4
