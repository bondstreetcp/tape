# Tape compute container for the Synology DS1621+ (Container Manager → Project).
# The container idles; the hourly DSM task runs `docker exec` → scripts/run-tick.ts (see
# scripts/nas/tape-tick.sh + docs/SETUP-NAS-CRON.md Phase 2). The repo lives on a NAS volume so
# node_modules persists between ticks (npm ci only reruns when the lockfile changes).
services:
  tape-runner:
    image: node:22-bookworm # includes git; DS1621+ is x86_64 (AMD V1500B) so standard amd64 images
    container_name: tape-runner
    working_dir: /app
    command: ["sleep", "infinity"] # idle; ticks arrive via docker exec
    restart: unless-stopped
    env_file:
      - /volume1/docker/tape/tape.env # ALL the API keys — chmod 600, never in the repo
    volumes:
      - /volume1/docker/tape/repo:/app # the git clone (bootstrap: see the runbook)
    environment:
      - TAPE_PULL=1 # each tick pulls latest main first (the checkout-equivalent)
    # 64 GB box — no limits needed; uncomment to be polite to other NAS services:
    # mem_limit: 16g
    # cpus: 4
